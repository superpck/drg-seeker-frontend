<main class="login-page">
  <section class="login-card" aria-labelledby="login-title">
    <div class="flex flex-col text-center">
      <h1 id="login-title" class="text-2xl my-2">{{ config.appName }}</h1>
      <p class="subtitle">{{ config.appDescription }}</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
      <label for="username">Username</label>
      <input id="username" type="text" formControlName="username" autocomplete="username" placeholder="demo.user" />

      <label for="password">Password</label>
      <input id="password" type="password" formControlName="password" autocomplete="current-password"
        placeholder="any password" />

      @if (errorMessage(); as message) {
      <p class="error" role="alert">{{ message }}</p>
      }

      <button type="submit" [disabled]="isSubmitting()">
        {{ isSubmitting() ? 'Signing in...' : 'Sign in' }}
      </button>
    </form>

    <div class="my-2 text-xs text-center text-gray-400">{{ config.appName }} {{ config.version }}</div>

  </section>
</main>
